name: Lint, Build, and Test

on:
  workflow_call:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
    outputs:
      child-workspace-package-names: ${{ steps.workspace-package-names.outputs.child-workspace-package-names }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          cache-node-modules: true
          node-version: ${{ matrix.node-version }}
          force-setup: true
      - name: Fetch workspace package names
        id: workspace-package-names
        run: |
          echo "child-workspace-package-names=$(yarn workspaces list --no-private --json | jq --slurp --raw-output 'map(.name) | @json')" >> "$GITHUB_OUTPUT"
        shell: bash

  lint:
    name: Lint (${{ matrix.script }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
        script:
          - codeowners:check
          - constraints
          - lint:dependencies
          - lint:eslint
          - lint:misc:check
          - lint:teams
          - lint:tsconfigs:all
          - messenger-action-types:check
          - readme-content:check
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - name: Run yarn ${{ matrix.script }}
        run: yarn "$SCRIPT"
        env:
          SCRIPT: ${{ matrix.script }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  validate-changelog:
    name: Validate changelog
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
          # Full history so `changelog:validate` can find the merge base with the
          # base branch to detect which packages are being released.
          fetch-depth: 0
      - run: yarn workspace "$PACKAGE_NAME" changelog:validate
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  validate-changelog-diffs:
    name: Validate changelog diffs
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate changelog diffs
        uses: ./.github/actions/check-merge-queue-changelogs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - run: yarn build
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  test-scripts:
    name: Test Scripts
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - run: yarn test:scripts
      - run: yarn test:scripts:shell
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  # The following `test-*` jobs are duplicated because a single job may only
  # create a maximum of 256 matrix combinations, and we have more than 256 total
  # test combinations across all Node.js versions.
  test-18:
    name: Test (18.x)
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 18.x
      - run: yarn workspace "$PACKAGE_NAME" run test
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  test-20:
    name: Test (20.x)
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 20.x
      - run: yarn workspace "$PACKAGE_NAME" run test
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  test-22:
    name: Test (22.x)
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 22.x
      - run: yarn workspace "$PACKAGE_NAME" run test
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  build-platform-api-docs:
    name: Build Platform API docs
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 24.x

      - name: Generate and build Platform API docs
        run: yarn docs:platform-api:build

  # The wallet-cli daemon e2e spawns the BUILT `mm` CLI and the native
  # better-sqlite3 addon as real child processes, so it needs its dependency
  # subtree built first and cannot run in the per-package `test-*` matrix above.
  test-wallet-cli-e2e:
    name: Test wallet-cli daemon e2e (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      pull-requests: read
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - name: Build wallet-cli and its dependencies
        run: yarn workspaces foreach --topological-dev --recursive --from '@metamask/wallet-cli' run build
      # The real-chain send e2e (`wallet-send.e2e.test.ts`) needs `anvil`
      # (Foundry). It is skip-if-absent, so only pay the Foundry download when
      # wallet-cli actually changed; on other PRs the test skips itself.
      - name: Detect whether wallet-cli changed
        id: wallet-cli-changed
        uses: actions/github-script@v8
        with:
          script: |
            try {
              if (context.eventName !== 'pull_request') {
                core.setOutput('changed', 'true');
                return;
              }
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              const changed = files.some((file) =>
                file.filename.startsWith('packages/wallet-cli/'),
              );
              core.setOutput('changed', String(changed));
            } catch (error) {
              // Never let detection break CI: fall back to running the suite.
              core.warning(
                `wallet-cli change detection failed; running anyway: ${error}`,
              );
              core.setOutput('changed', 'true');
            }
      - name: Install anvil for the real-chain e2e
        if: steps.wallet-cli-changed.outputs.changed == 'true'
        run: yarn workspace @metamask/wallet-cli run test:e2e:install-anvil
      # When wallet-cli changed we installed anvil, so require the real-chain
      # suite to actually find and run it — otherwise a broken install would
      # let the flagship send test pass as a silent green no-op.
      - run: yarn workspace @metamask/wallet-cli run test:e2e
        env:
          MM_E2E_REQUIRE_ANVIL: ${{ steps.wallet-cli-changed.outputs.changed }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi
