name: Lint, Build, and Test

on:
  workflow_call:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
    outputs:
      child-workspace-package-names: ${{ steps.workspace-package-names.outputs.child-workspace-package-names }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          cache-node-modules: true
          node-version: ${{ matrix.node-version }}
          force-setup: true
      - name: Fetch workspace package names
        id: workspace-package-names
        run: |
          echo "child-workspace-package-names=$(yarn workspaces list --no-private --json | jq --slurp --raw-output 'map(.name) | @json')" >> "$GITHUB_OUTPUT"
        shell: bash

  lint:
    name: Lint (${{ matrix.script }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
        script:
          - codeowners:check
          - constraints
          - lint:dependencies
          - lint:eslint
          - lint:misc:check
          - lint:teams
          - lint:tsconfigs:all
          - messenger-action-types:check
          - readme-content:check
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - name: Run yarn ${{ matrix.script }}
        run: yarn "$SCRIPT"
        env:
          SCRIPT: ${{ matrix.script }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  validate-changelog:
    name: Validate changelog
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
          # Full history so `changelog:validate` can find the merge base with the
          # base branch to detect which packages are being released.
          fetch-depth: 0
      - run: yarn workspace "$PACKAGE_NAME" changelog:validate
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  validate-changelog-diffs:
    name: Validate changelog diffs
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate changelog diffs
        uses: ./.github/actions/check-merge-queue-changelogs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - name: Fetch merge base
        id: fetch-merge-base
        if: github.base_ref != '' || github.event.merge_group.base_ref != ''
        run: |
          set -euo pipefail

          # Strip invalid prefix from `github.event.merge_group.base_ref`
          # It comes prefixed with `refs/heads/`, but the branch is not checked out in this context
          # We need to express it as a remote branch
          PREFIXED_REF_REGEX='refs/heads/(.+)'
          if [[ "$BASE_REF" =~ $PREFIXED_REF_REGEX ]]; then
            BASE_REF="${BASH_REMATCH[1]}"
          fi

          # Use the GitHub Compare API to get the exact merge base SHA.
          MERGE_BASE=$(gh api "repos/$GITHUB_REPOSITORY/compare/$BASE_REF...$HEAD_SHA" --jq '.merge_base_commit.sha')

          # Unshallow the checkout so git can confirm the ancestry
          # relationship required by `--since`. Using `--filter=blob:none`
          # avoids downloading file content — commit and tree metadata is
          # all that `git diff --name-only` needs.
          git fetch --unshallow --filter=blob:none --no-tags origin HEAD

          echo "merge-base=$MERGE_BASE" >> "$GITHUB_OUTPUT"
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          GH_TOKEN: ${{ github.token }}
      - name: Build
        run: |
          if [[ -n "$MERGE_BASE" ]]; then
            TSCONFIG=$(mktemp --tmpdir="$GITHUB_WORKSPACE" --suffix=.json)
            yarn tsx scripts/generate-partial-build-tsconfig.mts "$MERGE_BASE" > "$TSCONFIG"
            yarn ts-bridge --project "$TSCONFIG" --verbose
            rm -f "$TSCONFIG"
          else
            yarn build
          fi
        env:
          MERGE_BASE: ${{ steps.fetch-merge-base.outputs.merge-base }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  test-scripts:
    name: Test Scripts
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - run: yarn test:scripts
      - run: yarn test:scripts:shell
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  # The following `test-*` jobs are duplicated because a single job may only
  # create a maximum of 256 matrix combinations, and we have more than 256 total
  # test combinations across all Node.js versions.
  test-18:
    name: Test (18.x)
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 18.x
      - run: yarn workspace "$PACKAGE_NAME" run test
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  test-20:
    name: Test (20.x)
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 20.x
      - run: yarn workspace "$PACKAGE_NAME" run test
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  test-22:
    name: Test (22.x)
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        package-name: ${{ fromJson(needs.prepare.outputs.child-workspace-package-names) }}
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 22.x
      - run: yarn workspace "$PACKAGE_NAME" run test
        env:
          PACKAGE_NAME: ${{ matrix.package-name }}
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi

  build-platform-api-docs:
    name: Build Platform API docs
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: 24.x

      - name: Generate and build Platform API docs
        run: yarn docs:platform-api:build

  # The wallet-cli daemon e2e spawns the BUILT `mm` CLI and the native
  # better-sqlite3 addon as real child processes, so it needs its dependency
  # subtree built first and cannot run in the per-package `test-*` matrix above.
  test-wallet-cli-e2e:
    name: Test wallet-cli daemon e2e (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: false
          persist-credentials: false
          node-version: ${{ matrix.node-version }}
      - name: Build wallet-cli and its dependencies
        run: yarn workspaces foreach --topological-dev --recursive --from '@metamask/wallet-cli' run build
      - run: yarn workspace @metamask/wallet-cli run test:e2e
      - name: Require clean working directory
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "Working tree dirty at end of job"
            exit 1
          fi
