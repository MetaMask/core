name: Deploy Platform API Docs

on:
  workflow_call:

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    # `default-branch` is the environment the Token Exchange Service policy
    # matches on; it's locked to the `main` branch, so a PAT can only be minted
    # from a `main` run.
    environment: default-branch
    permissions:
      # `id-token: write` lets the job exchange its OIDC token for a PAT via the
      # Token Exchange Service; `contents: read` is for the checkout. The push
      # to `gh-pages` uses the exchanged PAT, not GITHUB_TOKEN.
      id-token: write
      contents: read
    steps:
      # Build the site fresh here rather than reusing the artifact from the
      # `build-platform-api-docs` job in `lint-build-test`: that job also runs
      # for PRs, so trusting its output (or the caches behind it) for a
      # production deploy would risk publishing poisoned content.
      # `is-high-risk-environment` isolates the build.
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v3
        with:
          is-high-risk-environment: true
          persist-credentials: false

      - name: Generate and build Platform API docs
        # The site is published under the `/platform-api/` subdirectory of the
        # repo's GitHub Pages site so that other doc sites (e.g. package API
        # docs) can be hosted alongside under sibling paths.
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          yarn docs:platform-api:build \
            --site-url "https://${REPO_OWNER}.github.io" \
            --site-base-url "/${REPO_NAME}/platform-api/"

      - name: Get access token
        # The token must be requested in the same job that uses it: GitHub drops
        # secret values passed between jobs, so a separate token job would hand
        # back an empty string.
        id: get-token
        uses: MetaMask/github-tools/.github/actions/get-token@v1
        with:
          token-exchange-url: ${{ vars.TOKEN_EXCHANGE_URL }}
          permissions: |
            contents: write

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          # Use a PAT obtained via Token Exchange Service rather than the
          # default `GITHUB_TOKEN`. `GITHUB_TOKEN` can't be granted branch
          # protections that disallow direct human pushes while still letting
          # this workflow publish, which is what we want for `gh-pages`.
          personal_token: ${{ steps.get-token.outputs.token }}
          publish_dir: ./.platform-api-docs/build
          destination_dir: platform-api
          # Preserve sibling subdirectories (e.g. /package-api/) so this deploy
          # only overwrites /platform-api/.
          keep_files: true
